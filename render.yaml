# Render Blueprint — librarymanagement-main-3
# Dashboard: https://dashboard.render.com/web/srv-d8e55lcm0tmc73ei3u0g
#
# Secrets (MONGODB_URI, DJANGO_DATABASE_URL, SECRET_KEY): set in Render UI
# per RENDER_SETUP.md — do not commit real passwords to git.

services:
  - type: web
    name: librarymanagement-main-3
    runtime: python
    plan: free
    rootDir: project_code
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: gunicorn bookhub_backend.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    healthCheckPath: /en/library/health/
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: DJANGO_SETTINGS_MODULE
        value: bookhub_backend.settings
      - key: DEBUG
        value: "False"
      - key: MONGODB_NAME
        value: bookhub_db
      - key: FRONTEND_URL
        value: https://librarymanagement-main-3.onrender.com
      - key: ALLOWED_HOSTS
        value: ".onrender.com,librarymanagement-main-3.onrender.com"
      - key: SECRET_KEY
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: DJANGO_DATABASE_URL
        sync: false
