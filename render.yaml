# Render Blueprint — full Django app (frontend + backend + static files)
# Dashboard: https://dashboard.render.com/web/srv-d8e55lcm0tmc73ei3u0g
#
# After deploy, set in Render Environment (sync: false = enter manually):
#   MONGODB_URI, DJANGO_DATABASE_URL (same Atlas URI, @ in password → %40)

services:
  - type: web
    name: librarymanagement-main-3
    runtime: python
    plan: free
    rootDir: project_code
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: gunicorn bookhub_backend.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --threads 2 --timeout 120
    healthCheckPath: /en/library/health/
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: DJANGO_SETTINGS_MODULE
        value: bookhub_backend.settings
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com,localhost,127.0.0.1"
      - key: MONGODB_NAME
        value: bookhub_db
      - key: SECRET_KEY
        generateValue: true
      - key: MONGODB_URI
        sync: false
      - key: DJANGO_DATABASE_URL
        sync: false
