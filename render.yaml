# Render Blueprint — librarymanagement-main-3
# Dashboard: https://dashboard.render.com/web/srv-d8e55lcm0tmc73ei3u0g
#
# Set MONGODB_URI + DJANGO_DATABASE_URL in Render UI (see RENDER_SETUP.md).

services:
  - type: web
    name: librarymanagement-main-3
    runtime: python
    plan: free
    rootDir: project_code
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: bash start.sh
    healthCheckPath: /health/
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: DJANGO_SETTINGS_MODULE
        value: bookhub_backend.settings
      - key: DEBUG
        value: "False"
      - key: SECURE_SSL_REDIRECT
        value: "False"
      - key: MONGODB_NAME
        value: bookhub_db
      - key: FRONTEND_URL
        value: https://librarymanagement-main-3tx9.onrender.com
      - key: ALLOWED_HOSTS
        value: ".onrender.com,librarymanagement-main-3tx9.onrender.com"
      - key: SECRET_KEY
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: DJANGO_DATABASE_URL
        sync: false
