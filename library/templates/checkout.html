<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Checkout | BOOK HUB</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans">
    <nav class="bg-white shadow-md sticky top-0 z-50 p-4">
        <div class="container mx-auto">
            <a href="{% url 'home' %}" class="text-2xl font-bold text-orange-600">BOOK HUB</a>
        </div>
    </nav>
    <div class="container mx-auto mt-10 p-6 bg-white rounded shadow text-gray-800 max-w-4xl">
        <h1 class="text-3xl font-bold mb-6 text-orange-700 border-b pb-4">Checkout Summary</h1>
        
        <div class="mb-8">
            <h2 class="text-xl font-bold mb-4">Items in your Order:</h2>
            <ul class="divide-y divide-gray-200">
                {% for item in cart_items %}
                <li class="py-3 flex justify-between">
                    <div>
                        <span class="font-medium">{{ item.book.title }}</span> 
                        <span class="text-sm text-gray-500 ml-2">x {{ item.quantity }}</span>
                    </div>
                    <span>${{ item.book.price }}</span>
                </li>
                {% endfor %}
            </ul>
            <div class="mt-4 flex justify-between font-bold text-xl border-t pt-4">
                <span>Total Amount:</span>
                <span class="text-orange-600">${{ total_amount }}</span>
            </div>
        </div>

        <form action="{% url 'checkout' %}" method="POST" class="text-right">
            {% csrf_token %}
            <a href="{% url 'view_cart' %}" class="text-gray-500 mr-4 hover:underline">Return to Cart</a>
            <button type="submit" class="bg-orange-600 text-white px-8 py-3 rounded-lg font-bold shadow hover:bg-orange-700 transition">
                Confirm & Proceed to Payment
            </button>
        </form>
    </div>
</body>
</html>
