{% load static %}
<nav class="bg-white shadow-md sticky top-0 z-50">
    <div class="container mx-auto px-6 py-3 flex items-center justify-between gap-6">
        
        <!-- Logo -->
        <div class="text-2xl font-bold text-orange-600 whitespace-nowrap">
            <a href="{% url 'home' %}">BOOK HUB</a>
        </div>

        <!-- Search Bar (Hidden on Mobile) -->
        <div class="hidden md:flex flex-1 max-w-xl bg-gray-100 rounded-lg overflow-hidden">
            <input type="text" placeholder="Search books, authors, ISBN..."
                class="w-full px-4 py-2 bg-transparent focus:outline-none">
            <button class="bg-orange-600 text-white px-4 hover:bg-orange-700 transition">
                <i class="fas fa-search"></i>
            </button>
        </div>

        <!-- Navigation Links (Hidden on Mobile) -->
        <div class="hidden md:flex space-x-8 font-medium">
            <a href="{% url 'categories' %}" class="text-gray-700 hover:text-orange-600 transition">Browse</a>
            <a href="#plans-section" class="text-gray-700 hover:text-orange-600 transition">Premium</a>
            <a href="#" class="text-gray-700 hover:text-orange-600 transition">Branches</a>
            <a href="#" class="text-gray-700 hover:text-orange-600 transition">Gift a Card</a>
        </div>

        <!-- Right Section: Auth or Profile -->
        <div class="flex items-center space-x-4">
            {% if user.is_authenticated %}
                <!-- Profile Dropdown for Authenticated Users -->
                <div class="relative">
                    <!-- Profile Button -->
                    <button 
                        id="profileBtn" 
                        onclick="toggleDropdown()"
                        class="w-10 h-10 rounded-full bg-orange-600 text-white font-bold flex items-center justify-center hover:bg-orange-700 transition shadow-md focus:outline-none focus:ring-2 focus:ring-orange-400 focus:ring-offset-2"
                        aria-label="User profile menu"
                        aria-expanded="false"
                        aria-haspopup="true">
                        {{ user.email.0|upper }}
                    </button>

                    <!-- Dropdown Menu -->
                    <div 
                        id="dropdownMenu" 
                        class="hidden absolute right-0 mt-2 w-48 bg-white rounded-lg shadow-xl border border-gray-200 py-2 z-50 animate-fadeIn origin-top-right"
                        style="display: none;">
                        
                        <!-- User Info -->
                        <div class="px-4 py-3 border-b border-gray-100">
                            <p class="text-sm font-semibold text-gray-900">{{ user.username }}</p>
                            <p class="text-xs text-gray-500 truncate">{{ user.email }}</p>
                        </div>

                        <!-- Logout Link -->
                        <a 
                            href="{% url 'account_logout' %}"
                            class="block px-4 py-2 text-red-600 hover:bg-red-50 transition text-sm font-medium focus:outline-none focus:bg-red-50"
                            onclick="closeDropdown()">
                            <i class="fas fa-sign-out-alt mr-2"></i> Logout
                        </a>
                    </div>
                </div>

            {% else %}
                <!-- Login and Sign Up for Non-Authenticated Users -->
                <a href="{% url 'login' %}">
                    <button class="text-gray-700 font-medium hover:text-orange-600 transition focus:outline-none focus:ring-2 focus:ring-orange-400 rounded px-2 py-1">
                        Login
                    </button>
                </a>
                <span class="text-gray-600 font-medium">or</span>
                <a href="{% url 'signup' %}">
                    <button class="bg-orange-600 text-white px-5 py-2 rounded-full hover:bg-orange-700 transition focus:outline-none focus:ring-2 focus:ring-orange-400 focus:ring-offset-2">
                        Join Now
                    </button>
                </a>
            {% endif %}
        </div>
    </div>
</nav>

<style>
    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(-8px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .animate-fadeIn {
        animation: fadeIn 0.2s ease-out forwards;
    }

    .animate-fadeOut {
        animation: fadeOut 0.15s ease-out forwards;
    }

    @keyframes fadeOut {
        from {
            opacity: 1;
            transform: translateY(0);
        }
        to {
            opacity: 0;
            transform: translateY(-8px);
        }
    }
</style>

<script>
    // Get DOM elements
    const profileBtn = document.getElementById('profileBtn');
    const dropdownMenu = document.getElementById('dropdownMenu');

    // Toggle dropdown visibility
    function toggleDropdown() {
        const isHidden = dropdownMenu.style.display === 'none' || !dropdownMenu.style.display;
        
        if (isHidden) {
            openDropdown();
            // Update aria-expanded attribute
            profileBtn.setAttribute('aria-expanded', 'true');
        } else {
            closeDropdown();
            // Update aria-expanded attribute
            profileBtn.setAttribute('aria-expanded', 'false');
        }
    }

    // Open dropdown with animation
    function openDropdown() {
        dropdownMenu.style.display = 'block';
        dropdownMenu.classList.add('animate-fadeIn');
        dropdownMenu.classList.remove('animate-fadeOut');
        
        // Add click listener to close dropdown when clicking outside
        document.addEventListener('click', handleClickOutside);
    }

    // Close dropdown with animation
    function closeDropdown() {
        dropdownMenu.classList.remove('animate-fadeIn');
        dropdownMenu.classList.add('animate-fadeOut');
        
        // Delay hiding to allow animation
        setTimeout(() => {
            dropdownMenu.style.display = 'none';
        }, 150);

        // Remove click listener
        document.removeEventListener('click', handleClickOutside);
    }

    // Close dropdown when clicking outside
    function handleClickOutside(event) {
        // Check if click is outside the profile button and dropdown
        if (!profileBtn.contains(event.target) && !dropdownMenu.contains(event.target)) {
            closeDropdown();
            profileBtn.setAttribute('aria-expanded', 'false');
        }
    }

    // Close dropdown on Escape key
    document.addEventListener('keydown', (event) => {
        if (event.key === 'Escape' && dropdownMenu.style.display !== 'none') {
            closeDropdown();
            profileBtn.setAttribute('aria-expanded', 'false');
            profileBtn.focus();
        }
    });

    // Optional: Prevent dropdown from closing when clicking items inside
    dropdownMenu.addEventListener('click', (event) => {
        // Allow links to work normally (logout link will redirect)
        if (event.target.tagName === 'A') {
            // Let the link redirect
            return;
        }
    });
</script>
