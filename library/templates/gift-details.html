<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gift Card Details | BOOK HUB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 text-gray-800">

    <!-- HEADER -->
    <header class="bg-white shadow-md">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <div class="text-2xl font-bold text-orange-600">
                BOOK<span class="text-gray-600">HUB</span>
            </div>
            <a href="gift-card.html" class="text-orange-600 font-medium hover:underline">
                Back
            </a>
        </div>
    </header>

    <!-- FORM -->
    <!-- FORM -->
<section class="container mx-auto py-16 px-6 max-w-3xl">
    <h1 class="text-3xl font-bold mb-8 text-center">Gift Card Details 🎁</h1>

    <div class="bg-white p-8 rounded-2xl shadow border">
        <form onsubmit="proceedPayment(event)" class="space-y-6">

            <div>
                <label class="block text-sm font-semibold mb-2">Recipient Name</label>
                <input type="text" required
                    class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-orange-500">
            </div>

            <div>
                <label class="block text-sm font-semibold mb-2">Recipient Email</label>
                <input type="email" required
                    class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-orange-500">
            </div>

            <!-- PLAN SELECTOR -->
            <div class="relative">
                <label class="block text-sm font-semibold mb-2">Selected Plan</label>
                <input type="text" id="plan" readonly onclick="togglePlans()"
                    placeholder="Click to choose a plan"
                    class="w-full px-4 py-2 border rounded-lg bg-gray-100 cursor-pointer">

                <!-- PLAN OPTIONS -->
                <div id="planOptions"
                    class="hidden absolute z-10 w-full bg-white border rounded-lg mt-2 shadow-lg">

                    <div onclick="selectPlan('1 Month – ₹500')"
                        class="px-4 py-3 hover:bg-orange-50 cursor-pointer">
                        1 Month – ₹500
                    </div>

                    <div onclick="selectPlan('3 Months – ₹1400')"
                        class="px-4 py-3 hover:bg-orange-50 cursor-pointer">
                        3 Months – ₹1400
                    </div>

                    <div onclick="selectPlan('6 Months – ₹2700')"
                        class="px-4 py-3 hover:bg-orange-50 cursor-pointer">
                        6 Months – ₹2700
                    </div>
                </div>
            </div>

            <a href="payment.html"><button type="submit"
                class="w-full bg-orange-600 text-white py-3 rounded-lg font-semibold hover:bg-orange-700">
                Proceed to Payment
            </button></a>
        </form>
    </div>
</section>


    <!-- SCRIPT -->
    <script>
    function togglePlans() {
        document.getElementById("planOptions").classList.toggle("hidden");
    }

    function selectPlan(plan) {
        document.getElementById("plan").value = plan;
        document.getElementById("planOptions").classList.add("hidden");
        localStorage.setItem("giftPlan", plan);
    }

    function proceedPayment(e) {
        e.preventDefault();
        alert("Payment successful! Gift card sent 🎉");
        localStorage.removeItem("giftPlan");
        window.location.href = "index.html";
    }
</script>


</body>
</html>
