{% load i18n %}

<!-- Floating AI Chat Widget -->
<div id="aiChatWindowContainer" class="fixed bottom-6 right-6 z-[9999]">
    <!-- Modern Chat Window -->
    <div id="aiChatPopover" class="mb-4 bg-white rounded-2xl shadow-2xl border border-gray-100 overflow-hidden flex flex-col transition-all duration-300 transform origin-bottom-right w-[350px] h-[500px] opacity-0 scale-95 translate-y-4 pointer-events-none" style="display: none;">
        <!-- Header -->
        <div class="bg-gradient-to-r from-orange-600 to-orange-500 px-5 py-4 flex justify-between items-center text-white cursor-move">
            <div class="flex items-center space-x-3">
                <div class="relative">
                    <div class="w-10 h-10 rounded-full bg-white/20 flex items-center justify-center backdrop-blur-sm">
                        <i class="fas fa-robot text-white text-lg"></i>
                    </div>
                    <div class="absolute -bottom-0.5 -right-0.5 w-3 h-3 bg-green-400 border-2 border-orange-500 rounded-full"></div>
                </div>
                <div>
                    <h3 class="font-bold text-sm">{% trans "AI Assistant" %}</h3>
                    <p class="text-[10px] text-orange-100 font-medium uppercase tracking-wider">{% trans "Online" %}</p>
                </div>
            </div>
            <button id="closeChatBtn" class="w-8 h-8 rounded-full bg-white/10 hover:bg-white/20 transition-all flex items-center justify-center text-white">
                <i class="fas fa-times text-sm"></i>
            </button>
        </div>

        <!-- Messages Area -->
        <div id="chatMessages" class="flex-1 overflow-y-auto p-5 space-y-4 bg-gray-50/50 scroll-smooth pb-8 relative">
            <div class="flex justify-start items-start space-x-3">
                <div class="w-8 h-8 rounded-full bg-gradient-to-br from-orange-100 to-orange-50 flex items-center justify-center flex-shrink-0 text-orange-600 shadow-sm border border-orange-100">
                    <i class="fas fa-robot text-xs"></i>
                </div>
                <div class="bg-white text-gray-700 rounded-2xl rounded-tl-none px-4 py-3 max-w-[85%] text-xs leading-relaxed border border-gray-100 shadow-sm">
                    {% trans "Hi! I'm your Book Hub assistant. How can I help you today?" %}
                </div>
            </div>
        </div>

        <!-- Typing Indicator -->
        <div id="typingIndicator" class="hidden px-5 pb-3 flex justify-start items-center space-x-3 absolute bottom-[72px] left-0 bg-gradient-to-t from-white to-transparent w-full pt-4 pointer-events-none">
            <div class="w-8 h-8 rounded-full bg-gradient-to-br from-orange-100 to-orange-50 flex items-center justify-center flex-shrink-0 text-orange-600 shadow-sm border border-orange-100 pointer-events-auto">
                <i class="fas fa-robot text-xs"></i>
            </div>
            <div class="flex space-x-1.5 bg-white px-4 py-2.5 rounded-2xl rounded-tl-none border border-gray-100 shadow-sm pointer-events-auto">
                <div class="w-1.5 h-1.5 bg-orange-400 rounded-full animate-bounce [animation-delay:-0.3s]"></div>
                <div class="w-1.5 h-1.5 bg-orange-400 rounded-full animate-bounce [animation-delay:-0.15s]"></div>
                <div class="w-1.5 h-1.5 bg-orange-400 rounded-full animate-bounce"></div>
            </div>
        </div>

        <!-- Camera Container -->
        <div id="cameraContainer" class="hidden relative w-full h-48 bg-black">
            <video id="video" class="w-full h-full object-cover" autoplay playsinline></video>
            <button id="captureBtn" class="absolute bottom-2 left-1/2 -translate-x-1/2 w-10 h-10 bg-white rounded-full border-4 border-orange-600 shadow-lg"></button>
            <button id="stopCameraBtn" class="absolute top-2 right-2 text-white bg-black/50 w-6 h-6 rounded-full flex items-center justify-center"><i class="fas fa-times text-xs"></i></button>
        </div>

        <!-- Input Area -->
        <div class="p-4 bg-white border-t border-gray-100 z-10">
            <div class="flex items-center space-x-2 mb-3 overflow-x-auto pb-1" style="scrollbar-width: none;">
                <button id="voiceBtn" class="flex-shrink-0 w-8 h-8 rounded-full bg-gray-50 text-gray-500 hover:bg-orange-50 hover:text-orange-600 transition shadow-sm border border-gray-100 flex items-center justify-center" title="Voice Input">
                    <i class="fas fa-microphone text-xs"></i>
                </button>
                <button id="cameraBtn" class="flex-shrink-0 w-8 h-8 rounded-full bg-gray-50 text-gray-500 hover:bg-blue-50 hover:text-blue-600 transition shadow-sm border border-gray-100 flex items-center justify-center" title="Open Camera">
                    <i class="fas fa-camera text-xs"></i>
                </button>
                <label for="fileInput" class="flex-shrink-0 w-8 h-8 rounded-full bg-gray-50 text-gray-500 hover:bg-purple-50 hover:text-purple-600 transition shadow-sm border border-gray-100 flex items-center justify-center cursor-pointer" title="Upload File">
                    <i class="fas fa-paperclip text-xs"></i>
                </label>
                <input type="file" id="fileInput" class="hidden" accept="image/*,.pdf,.doc,.docx">
            </div>
            
            <form id="aiChatForm" class="relative flex items-center">
                <input type="text" id="aiSearchInput" placeholder="{% trans 'Message Book Hub...' %}" class="w-full bg-gray-50 border border-gray-200 rounded-full pl-4 pr-12 py-2.5 text-sm text-gray-700 focus:outline-none focus:border-orange-500 focus:ring-2 focus:ring-orange-200 transition-all shadow-inner" autocomplete="off">
                <button type="submit" class="absolute right-1.5 w-8 h-8 bg-orange-600 text-white rounded-full hover:bg-orange-700 transition flex items-center justify-center shadow-md">
                    <i class="fas fa-paper-plane text-xs -ml-0.5"></i>
                </button>
            </form>
        </div>
    </div>

    {% if show_floating_button %}
    <!-- Floating Toggle Button (For Dashboards) -->
    <button id="chatbotToggleBtn" class="w-14 h-14 rounded-full bg-orange-600 text-white flex items-center justify-center hover:bg-orange-700 transition-all duration-300 shadow-2xl hover:scale-110 active:scale-95 relative group border-2 border-white">
        <span class="absolute top-0 right-0 w-4 h-4 bg-red-500 border-2 border-white rounded-full flex items-center justify-center z-10" id="chatNotificationDot">
            <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
        </span>
        <i class="fas fa-comment-dots text-2xl transition-transform duration-300 transform absolute" id="toggleIconChat"></i>
        <i class="fas fa-times text-2xl transition-transform duration-300 transform scale-0 absolute" id="toggleIconClose"></i>
    </button>
    {% endif %}
</div>

<!-- Tailwind CSS if not already present (Dashboards) -->
<script src="https://cdn.tailwindcss.com"></script>

<script>
(function() {
    const chatForm = document.getElementById('aiChatForm');
    const searchInput = document.getElementById('aiSearchInput');
    const chatPopover = document.getElementById('aiChatPopover');
    const chatMessages = document.getElementById('chatMessages');
    const closeChatBtn = document.getElementById('closeChatBtn');
    const chatbotToggleBtn = document.getElementById('chatbotToggleBtn');
    const chatNotificationDot = document.getElementById('chatNotificationDot');
    const toggleIconChat = document.getElementById('toggleIconChat');
    const toggleIconClose = document.getElementById('toggleIconClose');
    const typingIndicator = document.getElementById('typingIndicator');
    const voiceBtn = document.getElementById('voiceBtn');
    const cameraBtn = document.getElementById('cameraBtn');
    const fileInput = document.getElementById('fileInput');
    const cameraContainer = document.getElementById('cameraContainer');
    const video = document.getElementById('video');
    const captureBtn = document.getElementById('captureBtn');
    const stopCameraBtn = document.getElementById('stopCameraBtn');
    
    let isChatOpen = false;
    let mediaStream = null;

    function openChat() {
        if (isChatOpen) return;
        isChatOpen = true;
        if (chatNotificationDot) chatNotificationDot.style.display = 'none';
        chatPopover.style.display = 'flex';
        if (toggleIconChat) toggleIconChat.style.transform = 'scale(0)';
        if (toggleIconClose) toggleIconClose.style.transform = 'scale(1) rotate(90deg)';
        
        setTimeout(() => {
            chatPopover.classList.remove('opacity-0', 'scale-95', 'translate-y-4', 'pointer-events-none');
            chatPopover.classList.add('opacity-100', 'scale-100', 'translate-y-0');
        }, 10);
        setTimeout(scrollToBottom, 100);
    }

    function closeChat() {
        if (!isChatOpen) return;
        isChatOpen = false;
        stopCamera();
        chatPopover.classList.add('opacity-0', 'scale-95', 'translate-y-4', 'pointer-events-none');
        chatPopover.classList.remove('opacity-100', 'scale-100', 'translate-y-0');
        if (toggleIconChat) toggleIconChat.style.transform = 'scale(1)';
        if (toggleIconClose) toggleIconClose.style.transform = 'scale(0) rotate(0deg)';
        setTimeout(() => {
            if (!isChatOpen) chatPopover.style.display = 'none';
        }, 300);
    }

    if (chatbotToggleBtn) {
        chatbotToggleBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            isChatOpen ? closeChat() : openChat();
        });
    }

    if (closeChatBtn) closeChatBtn.addEventListener('click', (e) => { e.stopPropagation(); closeChat(); });

    document.addEventListener('click', (e) => {
        if (isChatOpen && !chatPopover.contains(e.target) && !chatbotToggleBtn.contains(e.target)) {
            closeChat();
        }
    });

    // Voice
    if (voiceBtn) {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            const recognition = new SpeechRecognition();
            recognition.onstart = () => voiceBtn.classList.add('animate-pulse', 'bg-red-100', 'text-red-600');
            recognition.onresult = (e) => searchInput.value = e.results[0][0].transcript;
            recognition.onend = () => voiceBtn.classList.remove('animate-pulse', 'bg-red-100', 'text-red-600');
            voiceBtn.addEventListener('click', () => recognition.start());
        } else { voiceBtn.style.display = 'none'; }
    }

    // Camera
    async function startCamera() {
        try {
            mediaStream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = mediaStream;
            cameraContainer.classList.remove('hidden');
        } catch (err) { alert("{% trans 'Could not access camera.' %}"); }
    }

    function stopCamera() {
        if (mediaStream) { mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; }
        cameraContainer.classList.add('hidden');
    }

    if (cameraBtn) cameraBtn.addEventListener('click', () => cameraContainer.classList.contains('hidden') ? startCamera() : stopCamera());
    if (stopCameraBtn) stopCameraBtn.addEventListener('click', stopCamera);
    if (captureBtn) {
        captureBtn.addEventListener('click', async () => {
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            const imageData = canvas.toDataURL('image/png');
            addMessageToChat('user', "{% trans 'Captured Image' %}", imageData);
            stopCamera();
            
            // Send to AI for facial analysis
            try {
                typingIndicator.classList.remove('hidden');
                const response = await fetch("{% url 'chat_api' %}", {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-CSRFToken': '{{ csrf_token }}' },
                    body: JSON.stringify({ message: "Analyze this image", image: imageData })
                });
                const data = await response.json();
                typingIndicator.classList.add('hidden');
                addMessageToChat('ai', data.response || "{% trans 'Error' %}");
            } catch (e) { typingIndicator.classList.add('hidden'); addMessageToChat('ai', "{% trans 'Error' %}"); }
        });
    }

    // Chat
    if (chatForm) {
        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const message = searchInput.value.trim();
            if (!message) return;
            addMessageToChat('user', message);
            searchInput.value = '';
            try {
                const response = await fetch("{% url 'chat_api' %}", {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-CSRFToken': '{{ csrf_token }}' },
                    body: JSON.stringify({ message: message })
                });
                const data = await response.json();
                typingIndicator.classList.add('hidden');
                addMessageToChat('ai', response.ok ? data.response : '{% trans "Error" %}');
            } catch (e) { typingIndicator.classList.add('hidden'); addMessageToChat('ai', '{% trans "Error" %}'); }
        });
    }

    function addMessageToChat(role, text, attachmentUrl = null) {
        if (role === 'ai') {
            typingIndicator.classList.remove('hidden');
            scrollToBottom();
            setTimeout(() => {
                typingIndicator.classList.add('hidden');
                renderMessage(role, text, attachmentUrl);
                if (!isChatOpen && chatNotificationDot) chatNotificationDot.style.display = 'flex';
            }, 1000 + Math.random() * 1000);
        } else { renderMessage(role, text, attachmentUrl); }
    }

    function renderMessage(role, text, attachmentUrl = null) {
        const div = document.createElement('div');
        div.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} items-start space-x-3 mb-4 opacity-0 translate-y-2 transition-all duration-300`;
        const icon = role === 'user' ? 'fa-user' : 'fa-robot';
        const color = role === 'user' ? 'orange-600 text-white' : 'gray-50 text-gray-700 border border-gray-100';
        
        div.innerHTML = `
            ${role === 'ai' ? `<div class="w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center flex-shrink-0 border border-gray-200"><i class="fas ${icon} text-xs text-orange-600"></i></div>` : ''}
            <div class="flex flex-col ${role === 'user' ? 'items-end' : 'items-start'} max-w-[85%]">
                <div class="bg-${color} rounded-2xl ${role === 'user' ? 'rounded-tr-none' : 'rounded-tl-none'} px-4 py-2.5 text-xs shadow-sm">${text}</div>
                ${attachmentUrl ? `<div class="mt-2 rounded-lg overflow-hidden border border-gray-100 shadow-sm max-w-full"><img src="${attachmentUrl}" class="max-h-48 object-cover w-full"></div>` : ''}
            </div>
            ${role === 'user' ? `<div class="w-8 h-8 rounded-full bg-orange-100 flex items-center justify-center flex-shrink-0 border border-orange-200"><i class="fas ${icon} text-xs text-orange-600"></i></div>` : ''}
        `;
        chatMessages.appendChild(div);
        setTimeout(() => div.classList.remove('opacity-0', 'translate-y-2'), 10);
        scrollToBottom();
    }

    function scrollToBottom() { chatMessages.scrollTo({ top: chatMessages.scrollHeight, behavior: 'smooth' }); }

    // Desktop Dragging
    let isDragging = false, currentX, currentY, initialX, initialY, xOffset = 0, yOffset = 0;
    const chatHeader = chatPopover.querySelector('.bg-gradient-to-r');
    if (chatHeader) {
        chatHeader.addEventListener('mousedown', (e) => { initialX = e.clientX - xOffset; initialY = e.clientY - yOffset; if (e.target === chatHeader || chatHeader.contains(e.target)) isDragging = true; });
        document.addEventListener('mousemove', (e) => { if (isDragging) { e.preventDefault(); currentX = e.clientX - initialX; currentY = e.clientY - initialY; xOffset = currentX; yOffset = currentY; chatPopover.style.transform = `translate3d(${currentX}px, ${currentY}px, 0) scale(1)`; } });
        document.addEventListener('mouseup', () => { initialX = currentX; initialY = currentY; isDragging = false; });
    }
})();
</script>
