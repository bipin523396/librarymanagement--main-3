{% extends 'base.html' %}
{% load i18n %}

{% block title %}{% trans "Password Reset Complete | BOOK HUB" %}{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gray-50 py-12 px-4">
    <div class="max-w-md w-full bg-white p-10 rounded-3xl shadow-xl border border-gray-100 text-center">
        <div class="w-20 h-20 bg-green-100 text-green-500 rounded-full flex items-center justify-center mx-auto mb-6">
            <i class="fas fa-check text-4xl"></i>
        </div>
        <h2 class="text-3xl font-extrabold text-gray-900 mb-4">{% trans "Password Reset Complete" %}</h2>
        <p class="text-gray-600 mb-8 leading-relaxed">
            {% trans "Your password has been set. You may go ahead and log in now." %}
        </p>
        <a href="{% url 'login' %}" class="inline-block bg-orange-600 text-white font-bold py-3 px-10 rounded-xl hover:bg-orange-700 shadow-lg shadow-orange-500/20 transition transform hover:-translate-y-0.5">
            {% trans "Log in" %}
        </a>
    </div>
</div>
{% endblock %}
