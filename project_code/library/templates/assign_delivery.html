{% extends 'base.html' %}
{% load i18n %}

{% block title %}Assign Delivery | BOOK HUB Admin{% endblock %}

{% block content %}
<div class="bg-gray-50 min-h-screen py-10">
    <div class="container mx-auto max-w-lg px-4">
        
        <div class="bg-white rounded-2xl shadow-sm p-8 border border-gray-100">
            <h2 class="text-2xl font-bold mb-6">Assign Delivery</h2>
            
            <div class="bg-blue-50 text-blue-800 p-4 rounded-xl mb-6 text-sm">
                <strong>Rental Details:</strong><br>
                Book: {{ rental.book.title }}<br>
                User: {{ rental.user.username }}<br>
                Due Date: {{ rental.due_date }}
            </div>

            <form method="POST">
                {% csrf_token %}
                <div class="mb-6">
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Select Delivery Person</label>
                    <select name="delivery_person" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-orange-500 focus:bg-white transition" required>
                        <option value="">-- Select Person --</option>
                        {% for boy in delivery_boys %}
                        <option value="{{ boy.id }}">{{ boy.user.username }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="flex gap-4">
                    <a href="{% url 'admin_dashboard' %}" class="flex-1 text-center bg-gray-100 hover:bg-gray-200 text-gray-800 font-bold py-3 rounded-xl transition">Cancel</a>
                    <button type="submit" class="flex-1 bg-orange-600 hover:bg-orange-700 text-white font-bold py-3 rounded-xl shadow-md transition transform active:scale-95">
                        Assign
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
