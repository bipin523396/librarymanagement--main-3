<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOOK HUB — Starting Up...</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            overflow: hidden;
        }

        /* Animated background orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            animation: float 8s ease-in-out infinite;
            pointer-events: none;
        }
        .orb-1 { width: 400px; height: 400px; background: #ea580c; top: -100px; left: -100px; animation-delay: 0s; }
        .orb-2 { width: 300px; height: 300px; background: #7c3aed; bottom: -80px; right: -80px; animation-delay: 3s; }
        .orb-3 { width: 200px; height: 200px; background: #0ea5e9; top: 50%; left: 50%; animation-delay: 5s; }

        @keyframes float {
            0%, 100% { transform: translateY(0px) scale(1); }
            50% { transform: translateY(-30px) scale(1.05); }
        }

        .card {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 60px 50px;
            background: rgba(255,255,255,0.04);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 28px;
            max-width: 480px;
            width: 90%;
            box-shadow: 0 25px 60px rgba(0,0,0,0.4);
        }

        .logo {
            font-size: 2.2rem;
            font-weight: 900;
            letter-spacing: -1px;
            background: linear-gradient(90deg, #fb923c, #f97316);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .tagline {
            font-size: 0.9rem;
            color: rgba(255,255,255,0.4);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 48px;
        }

        /* Book spinner */
        .spinner-wrap {
            position: relative;
            width: 80px;
            height: 80px;
            margin: 0 auto 36px;
        }

        .ring {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            border: 3px solid transparent;
            animation: spin 1.4s linear infinite;
        }
        .ring-1 { border-top-color: #f97316; }
        .ring-2 { inset: 8px; border-top-color: #a855f7; animation-duration: 1.0s; animation-direction: reverse; }
        .ring-3 { inset: 16px; border-top-color: #38bdf8; animation-duration: 1.8s; }

        @keyframes spin { to { transform: rotate(360deg); } }

        .book-icon {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        .status-text {
            font-size: 1.25rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 10px;
            min-height: 2rem;
            transition: opacity 0.3s;
        }

        .sub-text {
            font-size: 0.875rem;
            color: rgba(255,255,255,0.45);
            margin-bottom: 36px;
            line-height: 1.6;
        }

        /* Progress bar */
        .progress-track {
            background: rgba(255,255,255,0.08);
            border-radius: 100px;
            height: 6px;
            overflow: hidden;
            margin-bottom: 14px;
        }

        .progress-fill {
            height: 100%;
            border-radius: 100px;
            background: linear-gradient(90deg, #f97316, #a855f7, #38bdf8);
            background-size: 200% 100%;
            animation: shimmer 1.5s linear infinite;
            transition: width 0.5s ease;
            width: 0%;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .attempt-count {
            font-size: 0.78rem;
            color: rgba(255,255,255,0.3);
        }

        /* Success state */
        .success-icon {
            display: none;
            width: 80px;
            height: 80px;
            margin: 0 auto 36px;
            background: linear-gradient(135deg, #22c55e, #16a34a);
            border-radius: 50%;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .manual-btn {
            display: none;
            margin-top: 20px;
            padding: 12px 28px;
            background: #f97316;
            color: #fff;
            border: none;
            border-radius: 100px;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s, transform 0.1s;
        }
        .manual-btn:hover { background: #ea580c; transform: translateY(-2px); }

        .dots::after {
            content: '';
            animation: dots 1.5s steps(4, end) infinite;
        }
        @keyframes dots {
            0%   { content: ''; }
            25%  { content: '.'; }
            50%  { content: '..'; }
            75%  { content: '...'; }
            100% { content: ''; }
        }
    </style>
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <div class="card">
        <div class="logo">BOOK HUB</div>
        <div class="tagline">Library Management System</div>

        <div class="spinner-wrap" id="spinnerWrap">
            <div class="ring ring-1"></div>
            <div class="ring ring-2"></div>
            <div class="ring ring-3"></div>
            <div class="book-icon">📚</div>
        </div>

        <div class="success-icon" id="successIcon">✓</div>

        <div class="status-text" id="statusText">Waking up server<span class="dots"></span></div>
        <div class="sub-text" id="subText">
            The server is starting up. This takes about 30 seconds on first load.
            You'll be redirected automatically.
        </div>

        <div class="progress-track">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="attempt-count" id="attemptCount">Connecting...</div>

        <a href="{{ redirect_to }}" class="manual-btn" id="manualBtn">
            Go Now →
        </a>
    </div>

    <script>
        const REDIRECT_TO = "{{ redirect_to|escapejs }}";
        const PING_URL = window.location.origin + "/en/library/wake/";
        const MAX_WAIT_MS = 90000;   // 90 seconds max
        const INTERVAL_MS = 2500;    // ping every 2.5 seconds
        const MAX_PROGRESS = 95;     // don't fill to 100 until actually ready

        let attempts = 0;
        let startTime = Date.now();
        let succeeded = false;

        const statusText = document.getElementById('statusText');
        const subText = document.getElementById('subText');
        const progressFill = document.getElementById('progressFill');
        const attemptCount = document.getElementById('attemptCount');
        const spinnerWrap = document.getElementById('spinnerWrap');
        const successIcon = document.getElementById('successIcon');
        const manualBtn = document.getElementById('manualBtn');

        const messages = [
            "Waking up server",
            "Loading your library",
            "Almost there",
            "Connecting to database",
            "Preparing your dashboard",
        ];

        function updateProgress() {
            const elapsed = Date.now() - startTime;
            const pct = Math.min(MAX_PROGRESS, (elapsed / MAX_WAIT_MS) * 100);
            progressFill.style.width = pct + '%';
            statusText.innerHTML = messages[attempts % messages.length] + '<span class="dots"></span>';
            attemptCount.textContent = `Attempt ${attempts + 1} • ${Math.round(elapsed / 1000)}s elapsed`;
        }

        function onSuccess() {
            if (succeeded) return;
            succeeded = true;

            progressFill.style.width = '100%';
            spinnerWrap.style.display = 'none';
            successIcon.style.display = 'flex';
            statusText.textContent = 'Server is ready!';
            subText.textContent = 'Redirecting you now...';
            attemptCount.textContent = `Connected in ${Math.round((Date.now() - startTime) / 1000)}s`;

            setTimeout(() => {
                window.location.href = REDIRECT_TO;
            }, 800);
        }

        function onTimeout() {
            progressFill.style.width = MAX_PROGRESS + '%';
            statusText.textContent = 'Server is taking longer than usual';
            subText.textContent = 'The server may still be starting. Click the button below to try now, or wait.';
            manualBtn.style.display = 'inline-block';
            manualBtn.href = REDIRECT_TO;
        }

        async function ping() {
            if (succeeded) return;

            updateProgress();

            try {
                const res = await fetch(PING_URL, {
                    method: 'GET',
                    cache: 'no-store',
                    signal: AbortSignal.timeout(4000),
                });
                if (res.ok) {
                    onSuccess();
                    return;
                }
            } catch (e) {
                // Server not yet awake — keep trying
            }

            attempts++;
            const elapsed = Date.now() - startTime;

            if (elapsed >= MAX_WAIT_MS) {
                onTimeout();
                return;
            }

            setTimeout(ping, INTERVAL_MS);
        }

        // Show manual button after 45s as a fallback
        setTimeout(() => {
            if (!succeeded) {
                manualBtn.style.display = 'inline-block';
                manualBtn.href = REDIRECT_TO;
            }
        }, 45000);

        // Start pinging
        ping();
    </script>
</body>
</html>
