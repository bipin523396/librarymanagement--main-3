{% extends "base.html" %}
{% load i18n %}

{% block content %}
<div class="max-w-2xl mx-auto py-12 px-4 sm:px-6 lg:px-8">
  <div class="bg-white p-8 rounded-lg shadow-md text-center">
    <h1 class="text-2xl font-bold mb-4">{% trans "Confirm Your Payment" %}</h1>
    <p class="text-lg mb-6">{% trans "Total Amount:" %} <strong>${{ total }}</strong></p>
    <a href="{% url 'payment_callback' %}?ref={{ payment.reference_id }}" class="inline-block bg-orange-600 text-white px-6 py-3 rounded-lg hover:bg-orange-700 transition">
      {% trans "Pay Now" %}
    </a>
    <a href="{% url 'view_cart' %}" class="inline-block bg-gray-600 text-white px-6 py-3 rounded-lg hover:bg-gray-700 transition ml-4">
      {% trans "Back to Cart" %}
    </a>
  </div>
</div>
{% endblock %}
